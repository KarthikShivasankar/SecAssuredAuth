version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-auth_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-auth_db}
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=${APP_ENV:-production}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-auth_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-auth_db}
      - SECRET_KEY=${SECRET_KEY:?set SECRET_KEY}
      - MCP_SHARED_TOKEN=${MCP_SHARED_TOKEN:?set MCP_SHARED_TOKEN}
      - ADMIN_BOOTSTRAP_TOKEN=${ADMIN_BOOTSTRAP_TOKEN:?set ADMIN_BOOTSTRAP_TOKEN}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:8000}
      - TRUST_PROXY_HEADERS=${TRUST_PROXY_HEADERS:-true}
      - JWT_ISSUER=${JWT_ISSUER:-secassured-auth}
      - JWT_AUDIENCE=${JWT_AUDIENCE:-secassured-api}
      - MCP_CALCULATOR_URL=http://mcp_calculator:8101
      - MCP_EXTERNAL_DB_URL=http://mcp_external_db:8102
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3.1:8b
    depends_on:
      db:
        condition: service_healthy
      mcp_calculator:
        condition: service_started
      mcp_external_db:
        condition: service_started

  mcp_calculator:
    build: .
    command: ["uv", "run", "uvicorn", "mcp_calculator_server:app", "--host", "0.0.0.0", "--port", "8101"]
    environment:
      - APP_ENV=${APP_ENV:-production}
      - MCP_SHARED_TOKEN=${MCP_SHARED_TOKEN:?set MCP_SHARED_TOKEN}
    expose:
      - "8101"

  mcp_external_db:
    build: .
    command: ["uv", "run", "uvicorn", "mcp_external_db_server:app", "--host", "0.0.0.0", "--port", "8102"]
    environment:
      - APP_ENV=${APP_ENV:-production}
      - MCP_SHARED_TOKEN=${MCP_SHARED_TOKEN:?set MCP_SHARED_TOKEN}
      - EXTERNAL_DB_PATH=/app/external_data.db
    expose:
      - "8102"
